<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1600" viewBox="0 0 1080 1600">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ec"/>
      <stop offset="0.55" stop-color="#f3ead8"/>
      <stop offset="1" stop-color="#e6dbc6"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3f38"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a9792d"/>
      <stop offset="1" stop-color="#d7b46a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#3a2c18" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8d826e" stroke-width="0.7" opacity="0.17"/>
    </pattern>
    <style>
      .serif { font-family: "Source Han Serif SC", "Noto Serif CJK SC", "STSongti SC", "Songti SC", "STSong", SimSun, Georgia, serif; }
      .sans { font-family: "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
      .ink { fill: #17231d; }
      .muted { fill: #655f53; }
      .deep { fill: #0f4d42; }
      .goldText { fill: #9b6b22; }
      .smallCaps { letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1080" height="1600" fill="url(#paper)"/>
  <rect width="1080" height="1600" fill="url(#grid)" opacity="0.55"/>

  <path d="M0,0 H1080 V512 C828,465 674,548 486,497 C287,443 167,313 0,351 Z" fill="url(#ink)" opacity="0.96"/>
  <path d="M0,0 H1080 V372 C836,324 708,382 498,336 C301,293 171,183 0,218 Z" fill="#0b332d" opacity="0.82"/>
  <path d="M80,96 C270,54 420,142 572,108 C758,66 864,79 1000,42" fill="none" stroke="#d9c08c" stroke-width="1.2" opacity="0.55"/>
  <path d="M92,150 C286,112 423,203 610,158 C779,118 898,137 988,102" fill="none" stroke="#d9c08c" stroke-width="1.2" opacity="0.38"/>
  <path d="M82,214 C290,176 438,268 642,222 C814,184 922,198 994,164" fill="none" stroke="#d9c08c" stroke-width="1.2" opacity="0.28"/>

  <g transform="translate(74 78)">
    <rect x="0" y="0" width="184" height="34" rx="17" fill="#f7ead0" opacity="0.16" stroke="#d9c08c" stroke-width="1"/>
    <text x="18" y="23" class="sans smallCaps" font-size="13" fill="#ead9ae">ARCHIVAL RESEARCH PLATFORM</text>
  </g>

  <g transform="translate(74 148)">
    <text x="0" y="0" class="serif" font-size="72" font-weight="700" fill="#fff8e7">民盟历史文献研究库</text>
    <text x="3" y="56" class="sans" font-size="26" fill="#e7d8b9">海外一手档案 · 中英全文 · 页码引用 · 多源互证</text>
    <text x="3" y="104" class="sans" font-size="17" fill="#cbbf9e">A curated bilingual corpus for studying the China Democratic League in global archival records</text>
  </g>

  <g transform="translate(74 378)">
    <rect x="0" y="0" width="932" height="194" rx="8" fill="#fffaf0" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="932" height="6" fill="url(#gold)"/>
    <text x="42" y="58" class="serif ink" font-size="30" font-weight="700">把散落在海外档案中的民盟史料，整理成可检索、可引用、可复核的研究平台</text>
    <text x="42" y="102" class="sans muted" font-size="18">平台聚合 FRUS、CIA FOIA、Wilson Center、HathiTrust/IA、Hoover 等来源，保留原始出处链接与页码线索，</text>
    <text x="42" y="134" class="sans muted" font-size="18">为 1941-1950 年代中国民主同盟、第三方面、新政协与中外观察提供系统化证据库。</text>
    <text x="42" y="170" class="sans deep" font-size="18" font-weight="700">当前所有入库页段均已配套中文译文，并标记为 human-reviewed。</text>
  </g>

  <g transform="translate(74 628)">
    <text x="0" y="0" class="serif ink" font-size="34" font-weight="700">资料规模</text>
    <rect x="0" y="30" width="932" height="184" rx="8" fill="#ffffff" opacity="0.88" filter="url(#softShadow)"/>
    <g transform="translate(38 72)">
      <text x="0" y="0" class="mono deep" font-size="54" font-weight="700">496</text>
      <text x="0" y="38" class="sans muted" font-size="18">篇海外文献</text>
    </g>
    <g transform="translate(260 72)">
      <text x="0" y="0" class="mono deep" font-size="54" font-weight="700">710</text>
      <text x="0" y="38" class="sans muted" font-size="18">个全文页段</text>
    </g>
    <g transform="translate(484 72)">
      <text x="0" y="0" class="mono deep" font-size="54" font-weight="700">5</text>
      <text x="46" y="0" class="sans deep" font-size="25" font-weight="700">类来源</text>
      <text x="0" y="38" class="sans muted" font-size="18">外交 · 情报 · 冷战 · 报刊 · 私人档案</text>
    </g>
    <g transform="translate(744 72)">
      <text x="0" y="0" class="mono deep" font-size="54" font-weight="700">100%</text>
      <text x="0" y="38" class="sans muted" font-size="18">中文译文覆盖</text>
    </g>
  </g>

  <g transform="translate(74 898)">
    <text x="0" y="0" class="serif ink" font-size="34" font-weight="700">来源矩阵</text>
    <g transform="translate(0 34)">
      <rect x="0" y="0" width="932" height="288" rx="8" fill="#102f2b" filter="url(#softShadow)"/>
      <g opacity="0.22" fill="none" stroke="#d7b46a" stroke-width="1">
        <path d="M95,210 C260,88 368,228 516,108 C654,-4 782,84 858,44"/>
        <path d="M114,64 C246,176 394,48 544,178 C662,279 782,184 866,230"/>
      </g>
      <g class="sans" font-size="17" fill="#f8efd7">
        <g transform="translate(46 52)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">FRUS 美国外交文件集</text>
          <text x="24" y="34" fill="#cbbf9e">299 篇 · 416 页段</text>
        </g>
        <g transform="translate(430 52)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">CIA FOIA Reading Room</text>
          <text x="24" y="34" fill="#cbbf9e">117 篇 · 情报系统视角</text>
        </g>
        <g transform="translate(46 142)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">Wilson Center Digital Archive</text>
          <text x="24" y="34" fill="#cbbf9e">24 篇 · 苏联/冷战档案视角</text>
        </g>
        <g transform="translate(430 142)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">HathiTrust / Internet Archive</text>
          <text x="24" y="34" fill="#cbbf9e">54 篇 · 港媒与公开出版物</text>
        </g>
        <g transform="translate(46 232)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">Hoover Institution</text>
          <text x="24" y="34" fill="#cbbf9e">2 篇 · 私人档案与现场调档线索</text>
        </g>
        <g transform="translate(430 232)">
          <circle cx="0" cy="0" r="9" fill="#d7b46a"/>
          <text x="24" y="6">JACAR / HKPRO / NARA</text>
          <text x="24" y="34" fill="#cbbf9e">下一阶段：日本与港英殖民档案线索</text>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(74 1276)">
    <text x="0" y="0" class="serif ink" font-size="34" font-weight="700">研究能力</text>
    <g transform="translate(0 34)" class="sans">
      <rect x="0" y="0" width="296" height="146" rx="8" fill="#fffaf0" stroke="#d9d2bf"/>
      <rect x="318" y="0" width="296" height="146" rx="8" fill="#fffaf0" stroke="#d9d2bf"/>
      <rect x="636" y="0" width="296" height="146" rx="8" fill="#fffaf0" stroke="#d9d2bf"/>
      <text x="28" y="46" class="serif deep" font-size="24" font-weight="700">全文检索</text>
      <text x="28" y="82" class="muted" font-size="17">英文原文与中文译文并行检索</text>
      <text x="28" y="112" class="muted" font-size="17">人物、事件、组织一体索引</text>
      <text x="346" y="46" class="serif deep" font-size="24" font-weight="700">页码引用</text>
      <text x="346" y="82" class="muted" font-size="17">保留原始来源链接与页段定位</text>
      <text x="346" y="112" class="muted" font-size="17">支持 BibTeX / Chicago / GB/T</text>
      <text x="664" y="46" class="serif deep" font-size="24" font-weight="700">专题白皮书</text>
      <text x="664" y="82" class="muted" font-size="17">多源叙事与证据链整理</text>
      <text x="664" y="112" class="muted" font-size="17">适合学术写作与项目汇报</text>
    </g>
  </g>

  <g transform="translate(74 1516)">
    <rect x="0" y="0" width="932" height="1" fill="#b4a98f"/>
    <text x="0" y="36" class="sans muted" font-size="16">民盟历史文献研究库 · 海外一手档案整理与双语研究平台</text>
    <text x="932" y="36" text-anchor="end" class="sans goldText" font-size="16">FRUS · CIA · Wilson · HathiTrust/IA · Hoover</text>
  </g>
</svg>
